<!-- Place this block in the red-box area on bot.regs.com homepage. -->
<div class="cstar-msds-tool-entry">
  <div class="cstar-msds-copy">
    <strong>危化判定</strong>
    <span>按 SDS、UN 号、CAS、成分和监管清单输出证件路径。</span>
  </div>
  <button class="cstar-msds-open" type="button" onclick="openMsdsUnTool()">打开工具</button>
</div>

<div class="cstar-msds-modal" id="cstarMsdsModal" aria-hidden="true">
  <div class="cstar-msds-panel">
    <div class="cstar-msds-head">
      <strong>危化判定</strong>
      <button type="button" onclick="closeMsdsUnTool()" aria-label="关闭">×</button>
    </div>
    <iframe title="危化判定" src="/msds-un-app.html?embed=1"></iframe>
  </div>
</div>

<style>
  .cstar-msds-tool-entry {
    width: min(460px, 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding: 18px;
    border: 1px solid rgba(255, 255, 255, 0.38);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.1);
    color: #ffffff;
  }

  .cstar-msds-copy {
    display: grid;
    gap: 6px;
    min-width: 0;
  }

  .cstar-msds-copy strong {
    font-size: 18px;
    line-height: 1.25;
  }

  .cstar-msds-copy span {
    color: rgba(255, 255, 255, 0.82);
    font-size: 14px;
    line-height: 1.5;
  }

  .cstar-msds-open {
    min-height: 44px;
    padding: 0 18px;
    border: 0;
    border-radius: 8px;
    background: #ec4962;
    color: #ffffff;
    font: inherit;
    font-weight: 800;
    white-space: nowrap;
    cursor: pointer;
  }

  .cstar-msds-modal {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: none;
    padding: 24px;
    background: rgba(8, 22, 34, 0.72);
  }

  .cstar-msds-modal.is-open {
    display: grid;
    place-items: center;
  }

  .cstar-msds-panel {
    width: min(1400px, 100%);
    height: min(860px, calc(100vh - 48px));
    display: grid;
    grid-template-rows: auto 1fr;
    overflow: hidden;
    border-radius: 8px;
    background: #ffffff;
    box-shadow: 0 28px 80px rgba(0, 0, 0, 0.32);
  }

  .cstar-msds-head {
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 10px 14px 10px 18px;
    border-bottom: 1px solid #dde5ee;
    color: #1d2a3b;
    background: #ffffff;
  }

  .cstar-msds-head button {
    width: 40px;
    height: 40px;
    border: 1px solid #d8dee7;
    border-radius: 8px;
    background: #ffffff;
    color: #1d2a3b;
    font: inherit;
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
  }

  .cstar-msds-panel iframe {
    width: 100%;
    height: 100%;
    border: 0;
    background: #ffffff;
  }

  @media (max-width: 680px) {
    .cstar-msds-tool-entry {
      align-items: stretch;
      flex-direction: column;
    }

    .cstar-msds-open {
      width: 100%;
    }

    .cstar-msds-modal {
      padding: 10px;
    }

    .cstar-msds-panel {
      height: calc(100vh - 20px);
    }
  }
</style>

<script>
  function openMsdsUnTool() {
    document.getElementById("cstarMsdsModal").classList.add("is-open");
    document.getElementById("cstarMsdsModal").setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
  }

  function closeMsdsUnTool() {
    document.getElementById("cstarMsdsModal").classList.remove("is-open");
    document.getElementById("cstarMsdsModal").setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
  }
</script>
