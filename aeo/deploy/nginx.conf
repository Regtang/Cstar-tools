# 喜事达AEO —— Nginx 反向代理 + HTTPS 模板
# 放到 /etc/nginx/conf.d/xishida-aeo.conf，按需替换域名与证书路径后 reload。

# HTTP -> HTTPS 跳转
server {
    listen 80;
    server_name aeo.your-company.com;          # ← 改成你的域名
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name aeo.your-company.com;           # ← 改成你的域名

    # 证书（Let's Encrypt 示例路径，或换成企业证书）
    ssl_certificate     /etc/letsencrypt/live/aeo.your-company.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aeo.your-company.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8000;       # 应用监听地址
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 健康检查（可供负载均衡探活）
    location = /api/health {
        proxy_pass http://127.0.0.1:8000/api/health;
        access_log off;
    }
}
