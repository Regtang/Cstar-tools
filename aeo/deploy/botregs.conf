# 喜事达工具平台 —— Nginx 站点配置（bot.regs.com）
# 门户首页(/) + AEO平台(/aeo/) + 装箱软件(/packer/) + API(/api/)

server {
    listen 80;
    server_name bot.regs.com www.bot.regs.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name bot.regs.com www.bot.regs.com;

    ssl_certificate     /etc/ssl/botregs/bot.regs.com.pem;
    ssl_certificate_key /etc/ssl/botregs/bot.regs.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 20m;

    # 装箱软件（静态）
    location /packer/ {
        root /var/www;
        index index.html;
    }

    # AEO 认证平台（反向代理到容器，去掉 /aeo 前缀）
    location = /aeo { return 301 /aeo/; }
    location /aeo/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # AEO 的后端 API（前端用绝对路径 /api 调用）
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 平台托管工具（审核发布的工具，反代到容器按注册表+可见性提供文件）
    location /tools/ {
        proxy_pass http://127.0.0.1:8000/tools/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 门户导览首页（静态）
    location / {
        root /var/www/portal;
        index index.html;
    }
}
