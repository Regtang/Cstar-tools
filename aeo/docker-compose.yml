services:
  aeo:
    build: .
    container_name: xishida-aeo
    ports:
      - "8000:8000"
    environment:
      # 生产环境务必修改以下两项（参见 .env.example）
      - AEO_SECRET_KEY=${AEO_SECRET_KEY:-please-change-this-secret}
      - AEO_ADMIN_PASSWORD=${AEO_ADMIN_PASSWORD:-admin123}
      - AEO_DATA_DIR=/data
      # 前后端分离时设置允许的来源，如 https://aeo.yourcompany.com
      - AEO_CORS=${AEO_CORS:-}
      # 站点公网地址（用于重置密码邮件里的链接）
      - AEO_PUBLIC_URL=${AEO_PUBLIC_URL:-https://bot.cstar.com}
      # 邮件 SMTP（.env 中密码若含 $ 需写成 $$ 转义）
      - AEO_SMTP_HOST=${AEO_SMTP_HOST:-}
      - AEO_SMTP_PORT=${AEO_SMTP_PORT:-587}
      - AEO_SMTP_USER=${AEO_SMTP_USER:-}
      - AEO_SMTP_PASS=${AEO_SMTP_PASS:-}
      - AEO_SMTP_FROM=${AEO_SMTP_FROM:-}
      # 新工具提交即时通知收件邮箱（多个用逗号？此处填一个即可）
      - AEO_NOTIFY_EMAIL=${AEO_NOTIFY_EMAIL:-}
      # 工具合规自动评分：评分器读取前端产物的位置（只读挂载）
      - AEO_PORTAL_DIR=/srv/portal
      - AEO_PACKER_DIR=/srv/packer
      - AEO_FRONTEND_DIR=/srv/aeo
      - AEO_SELF_BASE=${AEO_SELF_BASE:-https://bot.cstar.com}
      # AI 价值评分（OpenAI 兼容）：配置后新工具自动 AI 评分。推荐 DeepSeek（国内可用、便宜）
      - AI_API_BASE=${AI_API_BASE:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-deepseek-chat}
    volumes:
      - aeo-data:/data
      # 只读挂载门户与装箱软件静态目录，供评分器读取 HTML（不影响 nginx 提供服务）
      - /var/www/portal:/srv/portal:ro
      - /var/www/packer:/srv/packer:ro
      # 实时挂载本次部署上传的 AEO 前端，确保评分读到最新文件（绕开镜像内旧副本）
      - ./frontend:/srv/aeo:ro
    restart: unless-stopped

volumes:
  aeo-data:
