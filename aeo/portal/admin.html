<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工具平台管理后台 · 喜事达</title>
  <link rel="stylesheet" href="/cstar-ui.css" />
  <style>
    main { max-width: 1100px; margin: 22px auto; padding: 0 18px 40px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab { padding: 9px 16px; border-radius: 10px; cursor: pointer; font-weight: 700; background: #eef2f5; color: #5b6b7a; border: 0; font: inherit; }
    .tab.on { background: var(--cs-teal); color: #fff; }
    .sub { border: 1px solid var(--cs-line); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
    .sub h3 { margin: 0 0 6px; font-size: 16px; }
    .meta { color: var(--cs-muted); font-size: 13px; margin-bottom: 10px; }
    .meta b { color: var(--cs-ink); }
    .login { max-width: 360px; margin: 60px auto; }
    .hide { display: none; }
    .vers { background: var(--cs-soft); border-radius: 8px; padding: 8px 10px; margin-top: 8px; font-size: 13px; }
    .vers .row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
  </style>
</head>
<body class="cstar-ui">
  <header class="cs-header">
    <h1>工具平台管理后台</h1>
    <p>审核同事提交、管理工具可见性与版本（仅管理员）</p>
  </header>

  <main>
    <!-- 登录 -->
    <section id="loginArea" class="cs-card login hide">
      <h2>管理员登录</h2>
      <div class="cs-card-body">
        <label class="cs-label">用户名</label>
        <input id="lu" class="cs-input" />
        <label class="cs-label">密码</label>
        <input id="lp" class="cs-input" type="password" onkeydown="if(event.key==='Enter')doLogin()" />
        <div id="lerr" class="cs-error-text" style="margin-top:10px"></div>
        <button class="cs-btn cs-btn-primary cs-btn-block" style="margin-top:14px" onclick="doLogin()">登录</button>
      </div>
    </section>

    <!-- 控制台 -->
    <div id="console" class="hide">
      <div class="tabs">
        <button class="tab on" id="tabSub" onclick="showTab('sub')">待审提交 <span id="subCount"></span></button>
        <button class="tab" id="tabTool" onclick="showTab('tool')">工具管理</button>
        <button class="tab" id="tabNeed" onclick="showTab('need')">需求管理 <span id="needCount"></span></button>
        <span style="margin-left:auto"></span>
        <button class="cs-btn cs-btn-ghost" onclick="changePw()">改密码</button>
        <button class="cs-btn cs-btn-ghost" onclick="logout()">退出</button>
      </div>
      <div id="subList"></div>
      <div id="toolList" class="hide"></div>
      <div id="needList" class="hide"></div>
    </div>
  </main>

<script>
const $ = id => document.getElementById(id);
let TOKEN = '';
try { TOKEN = localStorage.getItem('cstar_token') || localStorage.getItem('aeo_token') || ''; } catch (e) {}

function H() { return TOKEN ? { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' }; }
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function boot() {
  if (!TOKEN) return showLogin();
  try {
    const me = await fetch('/api/me', { headers: H() }).then(r => r.ok ? r.json() : null);
    if (me && (me.isPlatformAdmin || me.isAdmin)) { showConsole(); }
    else if (me) { showLogin('当前账号无平台管理权限，请用管理员账号登录'); }
    else showLogin();
  } catch (e) { showLogin(); }
}
function showLogin(msg) { $('loginArea').classList.remove('hide'); $('console').classList.add('hide'); if (msg) $('lerr').textContent = msg; }
function showConsole() { $('loginArea').classList.add('hide'); $('console').classList.remove('hide'); loadSubs(); loadTools(); loadNeeds(); }

async function doLogin() {
  $('lerr').textContent = '';
  const r = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: $('lu').value.trim(), password: $('lp').value }) });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) { $('lerr').textContent = j.detail || '登录失败'; return; }
  if (!(j.user && (j.user.isPlatformAdmin || j.user.isAdmin))) { $('lerr').textContent = '该账号无平台管理权限'; return; }
  TOKEN = j.token; try { localStorage.setItem('cstar_token', TOKEN); localStorage.setItem('aeo_token', TOKEN); } catch (e) {}
  showConsole();
}
function logout() { TOKEN = ''; try { localStorage.removeItem('cstar_token'); localStorage.removeItem('aeo_token'); } catch (e) {} showLogin(); }
async function changePw() {
  const oldp = prompt('请输入当前密码：'); if (oldp === null) return;
  const np = prompt('请输入新密码（至少6位）：'); if (np === null) return;
  const r = await fetch('/api/me/password', { method: 'POST', headers: H(), body: JSON.stringify({ old: oldp, new: np }) });
  const j = await r.json().catch(() => ({}));
  alert(r.ok ? '密码已修改' : ('修改失败：' + (j.detail || r.status)));
}

function showTab(t) {
  $('tabSub').classList.toggle('on', t === 'sub'); $('tabTool').classList.toggle('on', t === 'tool');
  $('tabNeed').classList.toggle('on', t === 'need');
  $('subList').classList.toggle('hide', t !== 'sub'); $('toolList').classList.toggle('hide', t !== 'tool');
  $('needList').classList.toggle('hide', t !== 'need');
}

/* ---- 待审提交 ---- */
async function loadSubs() {
  const rows = await fetch('/api/admin/submissions', { headers: H() }).then(r => r.json()).catch(() => []);
  const pending = rows.filter(s => s.status === '待审核');
  $('subCount').textContent = pending.length ? '(' + pending.length + ')' : '';
  if (!rows.length) { $('subList').innerHTML = '<p class="meta">暂无提交。</p>'; return; }
  $('subList').innerHTML = rows.map(s => {
    const kind = s.kind === 'update' ? ('更新现有工具 → ' + esc(s.target || '?')) : '新工具';
    const sc = s.selfcheck ? '✓ 已自检' : '✗ 未自检';
    const done = s.status !== '待审核';
    const actions = done ? `<span class="cs-badge cs-badge-info">${esc(s.status)}</span>` :
      `<button class="cs-btn cs-btn-soft" onclick="prescore(${s.id})">⊕ 先评分</button>
       <button class="cs-btn cs-btn-soft" onclick="dl(${s.id},'${esc(s.filename)}')">下载</button>
       <button class="cs-btn cs-btn-primary" onclick="approve(${s.id}, ${s.kind === 'update' ? 'true' : 'false'})">批准并发布</button>
       <button class="cs-btn cs-btn-ghost" onclick="reject(${s.id})">驳回</button>`;
    return `<div class="sub"><h3>${esc(s.name)} <span class="cs-badge ${s.kind === 'update' ? 'cs-badge-warn' : 'cs-badge-ok'}">${s.kind === 'update' ? '更新' : '新工具'}</span></h3>
      <div class="meta">类型：${kind}　|　版本：<b>${esc(s.version || '-')}</b>　|　开发者：${esc(s.developer || '-')}　|　${sc}　|　${(s.size/1024).toFixed(0)}KB　|　${esc(s.created_at || '')}</div>
      ${s.desc ? '<div class="meta">' + esc(s.desc) + '</div>' : ''}
      <div class="cs-actions">${actions}</div><div id="pre-${s.id}"></div></div>`;
  }).join('');
}
async function prescore(id) {
  const box = $('pre-' + id);
  box.innerHTML = '<div class="meta">按《前端统一标准》评分中…</div>';
  const r = await fetch('/api/admin/submissions/' + id + '/prescore', { method: 'POST', headers: H() });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) { box.innerHTML = '<div class="cs-error-text" style="margin-top:6px">评分失败：' + esc(j.detail || r.status) + '</div>'; return; }
  const col = j.score >= 85 ? '#1a9b54' : j.score >= 60 ? '#f29900' : '#e84368';
  box.innerHTML = '<div class="vers" style="margin-top:10px">'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'
    + '<b style="font-size:24px;color:' + col + '">' + j.score + '</b>'
    + '<span style="color:var(--cs-muted)">/ 100 · 发布前合规预评分</span></div>'
    + (j.items || []).map(it => '<div class="row" style="padding:3px 0"><span><span style="color:' + (it.ok ? '#1a9b54' : '#e84368') + ';font-weight:700">' + (it.ok ? '✓' : '×') + '</span> ' + esc(it.label) + '</span><span style="color:var(--cs-muted)">' + it.got + '/' + it.max + '</span></div>').join('')
    + '<div class="meta" style="margin-top:8px">据此决定是否「批准并发布」，或驳回让开发者按未达标项整改后再交。</div></div>';
}
async function dl(id, fname) {
  const r = await fetch('/api/admin/submissions/' + id + '/download', { headers: { 'Authorization': 'Bearer ' + TOKEN } });
  if (!r.ok) { alert('下载失败'); return; }
  const b = await r.blob(); const a = document.createElement('a');
  a.href = URL.createObjectURL(b); a.download = fname || 'package.zip'; a.click(); URL.revokeObjectURL(a.href);
}
async function approve(id, isUpdate) {
  let body = {};
  if (!isUpdate) {
    const slug = prompt('设置工具英文标识 slug（决定访问地址 /tools/<slug>/，留空自动生成）：', '');
    if (slug === null) return;
    const vis = prompt('可见性：external(对外) / internal(仅内部) / both(通用)', 'both');
    if (vis === null) return;
    const cat = prompt('分类（报关/物流/合规/财务/通用）', '通用') || '通用';
    body = { slug: slug.trim(), visibility: (vis || 'both').trim(), category: cat.trim() };
  } else {
    if (!confirm('确认批准并发布这个更新版本？将覆盖现有工具的当前版本（旧版保留可回滚）。')) return;
  }
  const r = await fetch('/api/admin/submissions/' + id + '/approve', { method: 'POST', headers: H(), body: JSON.stringify(body) });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) { alert('发布失败：' + (j.detail || r.status)); return; }
  alert('已发布：' + j.slug + ' @ ' + j.version + '\n访问 ' + j.url);
  loadSubs(); loadTools();
}
async function reject(id) {
  const reason = prompt('驳回原因（会记录）：', '');
  if (reason === null) return;
  const r = await fetch('/api/admin/submissions/' + id + '/reject', { method: 'POST', headers: H(), body: JSON.stringify({ reason }) });
  if (!r.ok) { alert('操作失败'); return; }
  loadSubs();
}

/* ---- 工具管理 ---- */
async function loadTools() {
  const rows = await fetch('/api/admin/tools', { headers: H() }).then(r => r.json()).catch(() => []);
  if (!rows.length) { $('toolList').innerHTML = '<p class="meta">暂无工具。</p>'; return; }
  $('toolList').innerHTML = '<p class="meta" style="margin-bottom:12px">综合分 = 价值分×70% + 合规分×30%；价值分由系统按逻辑（或大模型）自动生成，无需人工打分。</p>' + rows.map(t => {
    let vd = {}; try { vd = t.value_detail ? (JSON.parse(t.value_detail) || {}) : {}; } catch (e) {}
    const auto = (t.score != null && t.score >= 0) ? t.score : '—';
    const val = (t.value_score != null && t.value_score >= 0) ? t.value_score : '待评';
    return `
    <div class="sub" id="tool-${t.id}">
      <h3>${esc(t.name)} <span class="cs-badge cs-badge-info">${esc(t.slug)}</span></h3>
      <div class="meta">分类：${esc(t.category)}　|　入口：${esc(t.entry_kind)} ${esc(t.entry_path || '')}　|　负责人：${esc(t.owner_dept || '-')}</div>
      <div class="meta">合规自动分（占30%）：<b>${auto}</b>　|　人工价值分（占70%）：<b>${val}</b></div>
      <div class="cs-actions" style="align-items:center">
        可见性
        <select class="cs-select" style="width:auto" onchange="updTool(${t.id},'visibility',this.value)">
          ${['external','internal','both'].map(v => `<option value="${v}" ${t.visibility === v ? 'selected' : ''}>${v === 'external' ? '对外' : v === 'internal' ? '仅内部' : '通用'}</option>`).join('')}
        </select>
        状态
        <select class="cs-select" style="width:auto" onchange="updTool(${t.id},'status',this.value)">
          ${['online','hidden','deprecated'].map(v => `<option value="${v}" ${t.status === v ? 'selected' : ''}>${v === 'online' ? '上线' : v === 'hidden' ? '隐藏' : '已退役'}</option>`).join('')}
        </select>
        <button class="cs-btn cs-btn-soft" onclick="toggleVers(${t.id})">版本历史/回滚</button>
      </div>
      <div class="vers" style="margin-top:10px;background:#f0f7f9">
        <div style="font-weight:800;color:var(--cs-navy);margin-bottom:8px">价值评分（自动生成，高权重，占综合分 70%）</div>
        ${(t.value_score != null && t.value_score >= 0) ? `
          <div class="meta">客户价值 <b>${vd.customer != null ? vd.customer : '-'}</b>　用心程度 <b>${vd.craft != null ? vd.craft : '-'}</b>　业务价值 <b>${vd.business != null ? vd.business : '-'}</b>　→ 价值分 <b style="color:var(--cs-rose)">${t.value_score}</b></div>
          ${vd.note ? `<div class="meta">评语：${esc(vd.note)}</div>` : ''}
          ${vd.by ? `<div class="meta">来源：${esc(vd.by)} · ${esc(vd.at || '')}</div>` : ''}
        ` : `<div class="meta">价值分将在部署/上线时自动生成。</div>`}
      </div>
      <div id="vers-${t.id}" class="vers hide"></div>
    </div>`; }).join('');
}
async function updTool(id, field, value) {
  const r = await fetch('/api/admin/tools/' + id, { method: 'PUT', headers: H(), body: JSON.stringify({ [field]: value }) });
  if (!r.ok) alert('更新失败');
}
async function aiValue(id) {
  if (!confirm('让 AI 读取该工具源码并重新评估价值分（客户价值/用心程度/业务价值）？')) return;
  const r = await fetch('/api/admin/tools/' + id + '/ai-value', { method: 'POST', headers: H() });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) { alert('AI 评分失败：' + (j.detail || r.status)); return; }
  alert('AI 已评分 ✓ 价值分 ' + j.valueScore + '　综合分 ' + j.score);
  loadTools();
}
async function aiValueAll() {
  if (!confirm('让 AI 给全部工具重新评估价值分？（数量多时稍慢）')) return;
  const r = await fetch('/api/admin/tools/ai-value-all', { method: 'POST', headers: H() });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) { alert('失败：' + (j.detail || r.status)); return; }
  alert('AI 已评分 ' + j.scored + ' 个工具');
  loadTools();
}
async function toggleVers(id) {
  const box = $('vers-' + id);
  if (!box.classList.contains('hide')) { box.classList.add('hide'); return; }
  const rows = await fetch('/api/admin/tools/' + id + '/versions', { headers: H() }).then(r => r.json()).catch(() => []);
  box.innerHTML = rows.length ? rows.map(v => `<div class="row"><span>${esc(v.version)} ${v.isCurrent ? '<span class="cs-badge cs-badge-ok">当前</span>' : '<span class="cs-badge cs-badge-info">' + esc(v.state) + '</span>'} <span style="color:var(--cs-muted)">${esc(v.created_at || '')} · ${esc(v.approved_by || '')}</span></span>${v.isCurrent ? '' : `<button class="cs-btn cs-btn-ghost" onclick="rollback(${id},${v.id})">回滚到此版本</button>`}</div>`).join('') : '<div class="meta">该工具无托管版本（可能是 link/embed 旧工具）。</div>';
  box.classList.remove('hide');
}
async function rollback(tid, vid) {
  if (!confirm('确认回滚到该版本？')) return;
  const r = await fetch('/api/admin/tools/' + tid + '/rollback', { method: 'POST', headers: H(), body: JSON.stringify({ version_id: vid }) });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) { alert('回滚失败：' + (j.detail || r.status)); return; }
  alert('已回滚到 ' + j.version); toggleVers(tid); toggleVers(tid);
}

/* ---- 需求管理 ---- */
const NEED_ST = ['待评估','规划中','开发中','已上线','已关闭'];
async function loadNeeds() {
  const rows = await fetch('/api/admin/needs', { headers: H() }).then(r => r.json()).catch(() => []);
  const open = rows.filter(n => n.status === '待评估' && !n.hidden);
  $('needCount').textContent = open.length ? '(' + open.length + ')' : '';
  if (!rows.length) { $('needList').innerHTML = '<p class="meta">暂无需求。</p>'; return; }
  $('needList').innerHTML = rows.map(n => `
    <div class="sub" style="${n.hidden ? 'opacity:.55' : ''}">
      <h3>#${n.id} ${esc(n.title)} <span class="cs-badge cs-badge-info">${esc(n.kind)}</span>${n.hidden ? ' <span class="cs-badge cs-badge-warn">已隐藏</span>' : ''}</h3>
      <div class="meta">👍 <b>${n.votes || 0}</b> 同求　|　${esc(n.submitter || '匿名')}（${esc(n.identity)}）　|　联系：<b>${esc(n.contact || '-')}</b>　|　相关工具：${esc(n.tool || '-')}　|　${esc(n.created_at || '')}　|　IP ${esc(n.ip || '-')}</div>
      <div class="meta" style="white-space:pre-wrap;color:var(--cs-ink)">${esc(n.detail)}</div>
      ${(n.files || []).length ? '<div class="meta">附件：' + n.files.map(f => `<a href="${f.url}" target="_blank" rel="noopener" style="color:var(--cs-teal)">${esc(f.name)}</a>`).join('　') + '</div>' : ''}
      ${n.reply ? '<div class="vers">平台回复：' + esc(n.reply) + '</div>' : ''}
      <div class="cs-actions" style="align-items:center;margin-top:8px">
        状态
        <select class="cs-select" style="width:auto" onchange="updNeed(${n.id},{status:this.value})">
          ${NEED_ST.map(s => `<option ${n.status === s ? 'selected' : ''}>${s}</option>`).join('')}
        </select>
        <button class="cs-btn cs-btn-soft" onclick="replyNeed(${n.id},'${esc((n.reply || '').replace(/'/g, ''))}')">回复</button>
        <button class="cs-btn cs-btn-ghost" onclick="updNeed(${n.id},{hidden:${n.hidden ? 0 : 1}},true)">${n.hidden ? '恢复公示' : '隐藏'}</button>
        <button class="cs-btn cs-btn-ghost" style="color:var(--cs-danger)" onclick="delNeed(${n.id})">删除</button>
      </div>
    </div>`).join('');
}
async function updNeed(id, body, reload) {
  const r = await fetch('/api/admin/needs/' + id, { method: 'PUT', headers: H(), body: JSON.stringify(body) });
  if (!r.ok) { alert('更新失败'); return; }
  if (reload) loadNeeds();
}
async function replyNeed(id, cur) {
  const t = prompt('平台回复（会显示在公示墙）：', cur || '');
  if (t === null) return;
  await updNeed(id, { reply: t }, true);
}
async function delNeed(id) {
  if (!confirm('确认删除该需求？不可恢复（一般用「隐藏」即可）。')) return;
  const r = await fetch('/api/admin/needs/' + id, { method: 'DELETE', headers: H() });
  if (!r.ok) { alert('删除失败'); return; }
  loadNeeds();
}

boot();
</script>
</body>
</html>
