<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>集装箱设备交接单 EIR · 喜事达</title>
  <link rel="stylesheet" href="/cstar-ui.css" />
  <script src="/cstar-tool.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
  <script>
    document.documentElement.classList.toggle("embed-mode",
      new URLSearchParams(location.search).get("embed") === "1");
  </script>
  <style>
    main { max-width: 1280px; margin: 20px auto; padding: 0 18px 40px; }
    .layout { display: grid; grid-template-columns: 480px 1fr; gap: 18px; align-items: start; }
    .seg { display: flex; flex-wrap: wrap; gap: 6px; }
    .seg label { flex: 1; min-width: 60px; text-align: center; border: 1px solid #cfd6e0; border-radius: 9px; padding: 8px 4px; font-size: 13px; cursor: pointer; background: #fff; }
    .seg input { display: none; }
    .seg label:has(input:checked) { border-color: var(--cs-teal); background: #e6f3f6; color: var(--cs-teal-dark); font-weight: 800; }
    .sec { font-weight: 800; color: var(--cs-teal-dark); margin: 16px 0 6px; font-size: 14px; }
    .hint { font-size: 12px; margin-top: 4px; }
    .ok { color: var(--cs-ok); } .bad { color: var(--cs-danger); }
    .pads { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .pad { border: 1px dashed #cfd6e0; border-radius: 10px; padding: 6px; }
    .pad canvas { width: 100%; height: 86px; background: #fff; border-radius: 6px; touch-action: none; cursor: crosshair; }
    .pad .lab { font-size: 12px; color: var(--cs-muted); display: flex; justify-content: space-between; margin-bottom: 4px; }
    .pad .lab a { cursor: pointer; }

    /* 损坏示意图 */
    .diagram { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .diagram button { border: 1px solid #cfd6e0; background: #f5fbfc; border-radius: 8px; padding: 12px 4px; font-size: 12px; cursor: pointer; color: #1f2a37; font: inherit; line-height: 1.3; }
    .diagram button.bad { background: #fde8e6; border-color: var(--cs-danger); color: var(--cs-danger); font-weight: 800; }
    .diagram .en { display: block; font-size: 10px; color: var(--cs-muted); }
    .diagram button.bad .en { color: var(--cs-danger); }

    .dmgrow { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .dlist { margin-top: 8px; }
    .dlist .d { display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 13px; border: 1px solid var(--cs-line); border-radius: 8px; padding: 6px 9px; margin-bottom: 6px; background: #fff; }
    .dlist .d code { background: #eef6f8; color: var(--cs-teal-dark); padding: 1px 6px; border-radius: 5px; font-size: 12px; }
    .thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .thumbs .t { position: relative; }
    .thumbs img { width: 78px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid var(--cs-line); }
    .thumbs .x { position: absolute; top: -7px; right: -7px; background: var(--cs-danger); color: #fff; border: 0; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 13px; line-height: 1; }
    .dwellbox { font-size: 13px; background: #fafcfd; border: 1px solid var(--cs-line); border-radius: 8px; padding: 8px 10px; margin-top: 8px; }

    .doc { background: #fff; border: 1px solid var(--cs-line); border-radius: 12px; padding: 26px 28px; color: #1f2a37; }
    .doc .head { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid var(--cs-teal); padding-bottom: 10px; }
    .doc .head .cs { font-family: Arial, sans-serif; font-weight: 900; font-size: 21px; letter-spacing: 1.5px; color: var(--cs-teal); }
    .doc .head .cs i { font-style: normal; color: var(--cs-red); }
    .doc h2 { text-align: center; font-size: 19px; margin: 8px 0 2px; letter-spacing: 1px; }
    .doc .en2 { text-align: center; font-size: 11px; color: var(--cs-muted); letter-spacing: 2px; margin-bottom: 12px; }
    .doc .no { font-size: 12px; color: var(--cs-muted); text-align: right; }
    .doc table { width: 100%; border-collapse: collapse; margin: 6px 0 12px; font-size: 12.5px; }
    .doc th, .doc td { border: 1px solid #c9d2dc; padding: 6px 8px; text-align: left; vertical-align: top; }
    .doc th { background: #f1f6f8; white-space: nowrap; font-weight: 700; width: 86px; }
    .doc .sub { font-weight: 800; color: var(--cs-teal-dark); margin: 12px 0 5px; font-size: 13px; }
    .doc .terms { font-size: 11.5px; color: #44505e; line-height: 1.6; background: #fafcfd; border: 1px solid var(--cs-line); border-radius: 6px; padding: 8px 10px; }
    .doc .sign { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-top: 14px; }
    .doc .sign .line { border-top: 1px solid #1f2a37; margin-top: 34px; padding-top: 4px; color: var(--cs-muted); font-size: 11.5px; }
    .doc .sign img { max-height: 50px; display: block; }
    .doc .dgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin: 6px 0 10px; }
    .doc .dgrid span { border: 1px solid #c9d2dc; border-radius: 5px; text-align: center; font-size: 11px; padding: 6px 2px; }
    .doc .dgrid span.bad { background: #fde8e6; border-color: var(--cs-danger); color: var(--cs-danger); font-weight: 700; }
    .doc .photos { display: flex; flex-wrap: wrap; gap: 6px; }
    .doc .photos img { width: 120px; height: 90px; object-fit: cover; border: 1px solid #c9d2dc; border-radius: 4px; }
    .muted { color: var(--cs-muted); }
    .big { font-size: 15px; font-weight: 800; letter-spacing: 1px; }

    @media (max-width: 1020px) { .layout { grid-template-columns: 1fr; } }
    @media print {
      .cs-header, .panel, .no-print { display: none !important; }
      body.cstar-ui { background: #fff; }
      main, .layout { display: block; margin: 0; padding: 0; max-width: none; }
      .doc { border: 0; border-radius: 0; padding: 0; }
    }
  </style>
</head>
<body class="cstar-ui">
  <header class="cs-header">
    <h1>集装箱设备交接单 · EIR</h1>
    <p>Equipment Interchange Receipt · 进出场 / 提还空重 · 箱号校验 · 箱况查验 · 损坏代码 · 照片留存 · 电子签名</p>
  </header>

  <main>
    <div class="layout">
      <section class="cs-card panel no-print">
        <h2>填写交接信息</h2>
        <div class="cs-card-body">
          <label class="cs-label">进出方向 *</label>
          <div class="seg" id="segDir"></div>
          <label class="cs-label" style="margin-top:10px">作业类型 *</label>
          <div class="seg" id="segOp"></div>

          <div class="sec">箱体信息 Container</div>
          <label class="cs-label">箱号 Container No. *</label>
          <input id="cntr" class="cs-input" placeholder="如 CSNU1234560（4字母+7数字）" maxlength="11" oninput="onCntr()" style="text-transform:uppercase" />
          <div id="cntrHint" class="hint muted">输入 11 位箱号，自动校验 ISO 6346 校验位。</div>
          <div class="cs-row" style="margin-top:8px">
            <div><label class="cs-label">箱型尺寸 *</label><select id="size" class="cs-select" onchange="toggleRf()"></select></div>
            <div><label class="cs-label">重/空</label><select id="ldg" class="cs-select"><option>空箱 Empty</option><option>重箱 Laden</option></select></div>
          </div>
          <div class="cs-row">
            <div><label class="cs-label">铅封号 Seal</label><input id="seal" class="cs-input" placeholder="如 CN0928471" /></div>
            <div><label class="cs-label">船公司/箱主</label><input id="carrier" class="cs-input" placeholder="如 COSCO / MSK" /></div>
          </div>
          <div class="cs-row">
            <div><label class="cs-label">自重 Tare(kg)</label><input id="tare" class="cs-input" type="number" min="0" placeholder="如 3800" /></div>
            <div><label class="cs-label">限重 MaxGross(kg)</label><input id="mgw" class="cs-input" type="number" min="0" placeholder="如 30480" /></div>
          </div>
          <div id="rfRow" style="display:none">
            <div class="cs-row">
              <div><label class="cs-label">设定温度 ℃</label><input id="rfTemp" class="cs-input" placeholder="如 -18" /></div>
              <div><label class="cs-label">通风/湿度</label><input id="rfVent" class="cs-input" placeholder="如 20㎥/h，85%" /></div>
            </div>
          </div>

          <div class="sec">运输信息 Transport</div>
          <div class="cs-row">
            <div><label class="cs-label">提单号/订舱号</label><input id="bl" class="cs-input" placeholder="B/L 或 Booking No." /></div>
            <div><label class="cs-label">船名/航次</label><input id="vessel" class="cs-input" placeholder="如 COSCO XIAMEN / 072E" /></div>
          </div>
          <div class="cs-row">
            <div><label class="cs-label">车队 Trucker</label><input id="trucker" class="cs-input" placeholder="承运车队" /></div>
            <div><label class="cs-label">车牌号 *</label><input id="plate" class="cs-input" placeholder="如 沪B·D8521" /></div>
          </div>
          <div class="cs-row">
            <div><label class="cs-label">司机 Driver</label><input id="driver" class="cs-input" placeholder="司机姓名" /></div>
            <div><label class="cs-label">司机电话</label><input id="phone" class="cs-input" placeholder="联系电话" /></div>
          </div>
          <div class="cs-row">
            <div><label class="cs-label">堆场/码头 Depot</label><input id="depot" class="cs-input" placeholder="如 上港集团洋山三期" /></div>
            <div><label class="cs-label">进出场时间</label><input id="gtime" class="cs-input" type="datetime-local" /></div>
          </div>
          <button class="cs-btn cs-btn-ghost no-print" style="margin-top:8px;width:100%" onclick="dwellQuery()">① 查询该箱进出场 / 堆存天数</button>
          <div id="dwellBox"></div>

          <div class="sec">② 箱况示意图（点击部位标记完好/异常）</div>
          <div class="diagram" id="diagram"></div>

          <div class="sec">③ 箱损代码 Damage Codes（CEDEX/IICL）</div>
          <div class="dmgrow">
            <select id="dLoc" class="cs-select"></select>
            <select id="dComp" class="cs-select"></select>
          </div>
          <div class="dmgrow" style="margin-top:6px">
            <select id="dType" class="cs-select"></select>
            <input id="dSize" class="cs-input" placeholder="尺寸/数量 如 20cm" />
          </div>
          <div class="dmgrow" style="margin-top:6px">
            <select id="dRepair" class="cs-select"></select>
            <select id="dResp" class="cs-select"></select>
          </div>
          <button class="cs-btn cs-btn-soft no-print" style="margin-top:8px;width:100%" onclick="addDamage()">+ 添加损坏记录</button>
          <div class="dlist" id="dlist"></div>

          <div class="sec">④ 损坏照片 Photos（最多 6 张，自动压缩）</div>
          <input id="photoInput" type="file" accept="image/*" multiple class="no-print" onchange="addPhotos(this.files);this.value=''" />
          <div class="thumbs" id="thumbs"></div>

          <div class="sec">电子签名 Signatures</div>
          <div class="pads">
            <div class="pad"><div class="lab"><span>场站/交接方</span><a onclick="clearPad('padA')">清除</a></div><canvas id="padA" width="320" height="86"></canvas></div>
            <div class="pad"><div class="lab"><span>司机/车队</span><a onclick="clearPad('padB')">清除</a></div><canvas id="padB" width="320" height="86"></canvas></div>
          </div>

          <div id="err" class="cs-error-text" style="margin-top:12px"></div>
          <button class="cs-btn cs-btn-primary cs-btn-block" style="margin-top:14px" onclick="generate()">生成交接单 EIR</button>
          <div class="cs-actions">
            <button class="cs-btn cs-btn-soft" onclick="fillDemo()">填入示例</button>
            <button class="cs-btn cs-btn-ghost" onclick="window.print()">打印</button>
            <button class="cs-btn cs-btn-ghost" onclick="saveRecord()">存入台账</button>
            <button class="cs-btn cs-btn-ghost" onclick="exportJson()">导出JSON</button>
            <button class="cs-btn cs-btn-ghost" onclick="exportCsv()">导出台账CSV</button>
            <button class="cs-btn cs-btn-ghost" onclick="var r=generate();if(r)Cstar.exportPDF('doc',r.no+'.pdf')">导出PDF</button>
            <button class="cs-btn cs-btn-ghost" onclick="var r=generate();if(r)Cstar.exportWord('doc',r.no+'.doc')">导出Word</button>
            <button class="cs-btn cs-btn-ghost" onclick="台账Excel()">台账Excel</button>
            <button class="cs-btn cs-btn-ghost" onclick="exportCedex()">导出CEDEX报文</button>
            <button class="cs-btn cs-btn-ghost" onclick="statsReport()">统计报表</button>
            <button class="cs-btn cs-btn-ghost" onclick="clearAll()">清空</button>
          </div>

          <div class="sec" style="margin-top:18px">历史台账（本机）<span id="stats" class="muted" style="font-weight:400;font-size:12px"></span></div>
          <div class="dmgrow no-print" style="margin-bottom:8px">
            <input id="qText" class="cs-input" placeholder="搜 箱号/单号/车牌" oninput="renderHistory()" style="text-transform:uppercase" />
            <div style="display:flex;gap:6px">
              <input id="qFrom" class="cs-input" type="date" onchange="renderHistory()" title="起始日期" />
              <input id="qTo" class="cs-input" type="date" onchange="renderHistory()" title="截止日期" />
            </div>
          </div>
          <div id="history"></div>
        </div>
      </section>

      <section><div class="doc" id="doc"></div></section>
    </div>
  </main>

<script>
const $ = id => document.getElementById(id);
const STORE = 'cstar_eir_form', HKEY = 'cstar_eir_records';
const FREE_DAYS = 7;
const DIRS = ['进场 Gate-In', '出场 Gate-Out'];
const OPS = ['提空', '提重', '还空', '还重', '其他'];
const SIZES = ['20GP','40GP','40HQ','45HQ','20RF','40RF','20OT','40OT','20FR','40FR','20TK'];
const LOCS = [['前墙','Front'],['后框','Rear'],['顶部','Top'],['左侧','Left'],['右侧','Right'],['底部','Bottom'],['箱门','Door'],['底板','Floor'],['内壁','Interior']];
const RESP = ['船东/箱主','堆场','车队/客户','待定'];
/* CEDEX/IICL 级联：部件 → 适用损坏类型 → 适用维修方式 */
const COMP_DMG = {
  '侧板 Side panel': ['DT 凹陷','HO 破洞','CR 裂纹','RU 锈蚀','SC 划伤','CU 割裂','BE 弯曲'],
  '端墙 End wall': ['DT 凹陷','HO 破洞','CR 裂纹','RU 锈蚀','BE 弯曲'],
  '门板 Door panel': ['DT 凹陷','HO 破洞','RU 锈蚀','BE 弯曲','CR 裂纹'],
  '顶板 Roof': ['DT 凹陷','HO 破洞','CR 裂纹','RU 锈蚀','PH 穿孔'],
  '底板 Floor': ['BR 断裂','DL 脱层','HO 破洞','CO 污染','MS 缺失'],
  '角柱 Corner post': ['BE 弯曲','CR 裂纹','DT 凹陷'],
  '角件 Corner casting': ['CR 裂纹','BE 弯曲','MS 缺失'],
  '横梁 Cross member': ['BE 弯曲','CR 裂纹','RU 锈蚀'],
  '门锁杆 Locking bar': ['BE 弯曲','MS 缺失','SE 卡滞'],
  '门封条 Gasket': ['MS 缺失','DY 老化','CU 割裂'],
  '叉槽 Fork pocket': ['DT 凹陷','BE 弯曲','CR 裂纹'],
  '其他 Other': ['DT 凹陷','HO 破洞','BR 断裂','BE 弯曲','CR 裂纹','MS 缺失','RU 锈蚀','CU 割裂','SC 划伤','DY 变形','CO 污染']
};
const DMG_REPAIR = {
  'DT 凹陷':['ST 校正','RP 修补','RE 更换'], 'HO 破洞':['RP 修补','WE 焊接','RE 更换'],
  'CR 裂纹':['WE 焊接','RP 修补','RE 更换'], 'RU 锈蚀':['CL 清洗','RP 修补','RE 更换'],
  'SC 划伤':['RP 修补','— 不需'], 'CU 割裂':['WE 焊接','RP 修补','RE 更换'],
  'BE 弯曲':['ST 校正','RE 更换'], 'PH 穿孔':['WE 焊接','RP 修补','RE 更换'],
  'BR 断裂':['RE 更换','WE 焊接'], 'DL 脱层':['RE 更换','RP 修补'],
  'MS 缺失':['RE 更换'], 'SE 卡滞':['RP 修补','ST 校正','RE 更换'],
  'DY 老化':['RE 更换'], 'CO 污染':['CL 清洗']
};

let locStatus = {};   // {前墙:'完好'|'异常'}
let damages = [];     // {loc,comp,dtype,size,repair,resp}
let photos = [];      // dataURL[]

LOCS.forEach(l => locStatus[l[0]] = '完好');

$('segDir').innerHTML = DIRS.map((t,i)=>`<label><input type="radio" name="dir" value="${t}" ${i===0?'checked':''}>${t}</label>`).join('');
$('segOp').innerHTML = OPS.map((t,i)=>`<label><input type="radio" name="op" value="${t}" ${i===0?'checked':''}>${t}</label>`).join('');
$('size').innerHTML = '<option value="">— 箱型 —</option>'+SIZES.map(s=>`<option>${s}</option>`).join('');
$('dLoc').innerHTML = LOCS.map(l=>`<option>${l[0]} ${l[1]}</option>`).join('');
$('dComp').innerHTML = Object.keys(COMP_DMG).map(c=>`<option>${c}</option>`).join('');
$('dResp').innerHTML = RESP.map(c=>`<option>${c}</option>`).join('');
/* IICL 级联：部件→损坏类型→维修方式 */
function onComp(){ const list=COMP_DMG[$('dComp').value]||[]; $('dType').innerHTML=list.map(c=>`<option>${c}</option>`).join(''); onType(); }
function onType(){ const list=DMG_REPAIR[$('dType').value]||['RP 修补','RE 更换','— 不需']; $('dRepair').innerHTML=list.map(c=>`<option>${c}</option>`).join(''); }
$('dComp').addEventListener('change', onComp);
$('dType').addEventListener('change', onType);
onComp();

/* ① 损坏示意图 */
function renderDiagram(){
  $('diagram').innerHTML = LOCS.map(l=>{
    const bad = locStatus[l[0]] === '异常';
    return `<button type="button" class="${bad?'bad':''}" onclick="toggleLoc('${l[0]}')">${l[0]}<span class="en">${l[1]}${bad?' ⚠':''}</span></button>`;
  }).join('');
}
function toggleLoc(name){ locStatus[name] = locStatus[name] === '异常' ? '完好' : '异常'; renderDiagram(); autosave(); }

/* ISO 6346 箱号校验位 */
const LV = {A:10,B:12,C:13,D:14,E:15,F:16,G:17,H:18,I:19,J:20,K:21,L:23,M:24,N:25,O:26,P:27,Q:28,R:29,S:30,T:31,U:32,V:34,W:35,X:36,Y:37,Z:38};
function checkDigit(s10){ let sum=0; for(let i=0;i<10;i++){const ch=s10[i];const v=/[0-9]/.test(ch)?+ch:LV[ch];sum+=v*Math.pow(2,i);} let cd=sum%11; return cd===10?0:cd; }
function cntrValid(c){ return /^[A-Z]{4}[0-9]{7}$/.test(c) && checkDigit(c.slice(0,10))===+c[10]; }
function onCntr(){
  const c=$('cntr').value.toUpperCase().replace(/\s/g,''); $('cntr').value=c;
  const h=$('cntrHint');
  if(c.length<11){ h.className='hint muted'; h.textContent='输入 11 位箱号（4字母+7数字），自动校验 ISO 6346 校验位。'; return; }
  if(!/^[A-Z]{4}[0-9]{7}$/.test(c)){ h.className='hint bad'; h.textContent='✗ 格式应为 4 位字母 + 7 位数字'; return; }
  const want=checkDigit(c.slice(0,10));
  if(want===+c[10]){ h.className='hint ok'; h.textContent='✓ 箱号校验位正确（ISO 6346）'; }
  else { h.className='hint bad'; h.textContent='✗ 校验位应为 '+want+'（当前 '+c[10]+'），请核对箱号'; }
}
function toggleRf(){ $('rfRow').style.display=/RF/.test($('size').value)?'':'none'; }

/* ③ 损坏代码 */
function addDamage(){
  damages.push({ loc:$('dLoc').value, comp:$('dComp').value, dtype:$('dType').value, size:val('dSize'), repair:$('dRepair').value, resp:$('dResp').value });
  // 自动把该部位在示意图标为异常
  const locName=$('dLoc').value.split(' ')[0]; if(locStatus[locName]!==undefined){locStatus[locName]='异常';renderDiagram();}
  $('dSize').value=''; renderDamages(); autosave();
}
function renderDamages(){
  $('dlist').innerHTML = damages.length ? damages.map((d,i)=>
    `<div class="d"><span><code>${esc(d.dtype.split(' ')[0])}</code> ${esc(d.loc.split(' ')[0])} · ${esc(d.comp.split(' ')[0])} · ${esc(d.dtype.split(' ')[1]||'')} ${esc(d.size||'')} · ${esc(d.repair.split(' ')[1]||d.repair)} · ${esc(d.resp)}</span><button class="cs-btn cs-btn-ghost" onclick="delDamage(${i})">删</button></div>`).join('')
    : '<p class="muted" style="font-size:12px">暂无损坏记录（箱况完好）。</p>';
}
function delDamage(i){ damages.splice(i,1); renderDamages(); autosave(); }

/* ④ 照片（压缩） */
function addPhotos(files){
  [...files].slice(0, 6 - photos.length).forEach(f=>{
    if(!f.type.startsWith('image/')) return;
    const r=new FileReader();
    r.onload=()=>{ const img=new Image(); img.onload=()=>{

/* 签名 */
function initPad(id){
  const c=$(id),ctx=c.getContext('2d');let on=false;
  const pos=e=>{const r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return [(t.clientX-r.left)*(c.width/r.width),(t.clientY-r.top)*(c.height/r.height)];};
  const s=e=>{on=true;const[x,y]=pos(e);ctx.beginPath();ctx.moveTo(x,y);e.preventDefault();};
  const m=e=>{if(!on)return;const[x,y]=pos(e);ctx.lineTo(x,y);ctx.strokeStyle='#1f2a37';ctx.lineWidth=2;ctx.lineCap='round';ctx.stroke();e.preventDefault();};
  const en=()=>{if(on){on=false;autosave();}};
  c.addEventListener('mousedown',s);c.addEventListener('mousemove',m);window.addEventListener('mouseup',en);
  c.addEventListener('touchstart',s,{passive:false});c.addEventListener('touchmove',m,{passive:false});c.addEventListener('touchend',en);
}
initPad('padA');initPad('padB');
function clearPad(id){const c=$(id);c.getContext('2d').clearRect(0,0,c.width,c.height);autosave();}
function padEmpty(id){const d=$(id).getContext('2d').getImageData(0,0,$(id).width,$(id).height).data;for(let i=3;i<d.length;i+=4)if(d[i])return false;return true;}
function padURL(id){return padEmpty(id)?'':$(id).toDataURL('image/png');}

function val(id){return ($(id).value||'').trim();}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ④ 进出场配对 + 堆存天数 */
function dwellQuery(){
  const c=val('cntr').toUpperCase();
  const box=$('dwellBox');
  if(!c){ box.innerHTML='<div class="dwellbox bad">请先填写箱号。</div>'; return; }
  const recs=records().filter(r=>(r.cntr||'').toUpperCase()===c);
  const last=type=>{const f=recs.filter(r=>new RegExp(type).test(r.dir)).sort((a,b)=>(b.gtime||'').localeCompare(a.gtime||''));return f[0];};
  const gi=last('进场'), go=last('出场');
  if(!gi&&!go){ box.innerHTML=`<div class="dwellbox">台账中无箱号 <b>${esc(c)}</b> 的进出场记录。</div>`; return; }
  let html='<div class="dwellbox">';
  html+=`进场：${gi?esc((gi.gtime||'').replace('T',' ')):'<span class="muted">无</span>'}　|　出场：${go?esc((go.gtime||'').replace('T',' ')):'<span class="muted">无</span>'}`;
  if(gi&&go&&gi.gtime&&go.gtime){
    const days=Math.max(0,Math.round((new Date(go.gtime)-new Date(gi.gtime))/86400000));
    const over=days>FREE_DAYS;
    html+=`<br>堆存天数：<b class="${over?'bad':'ok'}">${days} 天</b>（免堆期 ${FREE_DAYS} 天）${over?` · <b class="bad">已超期 ${days-FREE_DAYS} 天，需缴滞箱/堆存费</b>`:' · 未超期'}`;
  } else if(gi&&!go){
    const days=Math.max(0,Math.round((Date.now()-new Date(gi.gtime))/86400000));
    html+=`<br>在场天数：<b class="${days>FREE_DAYS?'bad':'ok'}">${days} 天</b>（尚未出场，免堆期 ${FREE_DAYS} 天）`;
  }
  box.innerHTML=html+'</div>';
}

  $('history').innerHTML=l.length?l.map((x,i)=>{const idx=all.indexOf(x);const d=x.d||x;const nd=(d.damages&&d.damages.length)||Object.values(d.locStatus||{}).includes('异常');
    return `<div class="d" style="display:flex;justify-content:space-between;align-items:center;border:1px solid var(--cs-line);border-radius:8px;padding:6px 9px;margin-bottom:6px">
    <div><b>${esc(x.cntr)}</b> ${esc(x.size)} <span class="muted">· ${esc(x.dir)}/${esc(x.op)}</span>${nd?' <span class="bad" style="font-size:12px">⚠损</span>':''}<br><span class="muted" style="font-size:12px">${esc(x.no)} · ${esc(x.plate||'')} · ${esc((x.gtime||'').replace('T',' '))}</span></div>
    <div style="display:flex;gap:6px"><button class="cs-btn cs-btn-soft" onclick="loadRecord(${idx})">载入</button><button class="cs-btn cs-btn-ghost" onclick="delRecord(${idx})">删除</button></div></div>`;}).join('')
    :'<p class="muted" style="font-size:13px">暂无记录。点「存入台账」保存当前 EIR。</p>';
}
function loadRecord(i){const x=records()[i];if(!x)return;try{localStorage.setItem(STORE,JSON.stringify(x.d));}catch(e){}['padA','padB'].forEach(p=>{const c=$(p);c.getContext('2d').clearRect(0,0,c.width,c.height);});restore();generate();}
function delRecord(i){const l=records();l.splice(i,1);try{localStorage.setItem(HKEY,JSON.stringify(l));}catch(e){}renderHistory();renderStats();}

function clearAll(){
  document.querySelector('input[name="dir"]').checked=true; document.querySelector('input[name="op"]').checked=true;
  ['cntr','seal','carrier','tare','mgw','rfTemp','rfVent','bl','vessel','trucker','plate','driver','phone','depot','dSize'].forEach(id=>$(id).value='');
  $('size').value=''; $('ldg').selectedIndex=0; toggleRf(); onCntr();
  Object.keys(locStatus).forEach(k=>locStatus[k]='完好'); damages=[]; photos=[];
  renderDiagram(); renderDamages(); renderPhotos();
  $('gtime').value=new Date().toISOString().slice(0,16); $('dwellBox').innerHTML='';
  clearPad('padA');clearPad('padB');$('doc').innerHTML='';$('err').textContent='';
  try{localStorage.removeItem(STORE);}catch(e){}
}

document.addEventListener('input',e=>{if(e.target.closest('.panel'))autosave();});
document.addEventListener('change',e=>{if(e.target.closest('.panel'))autosave();});

if(window.Cstar&&Cstar.stamp) Cstar.stamp({tool:'集装箱设备交接单 EIR', version:'v1.2.0', author:'老瑞'});
$('gtime').value=new Date().toISOString().slice(0,16);
renderDiagram(); renderDamages(); renderPhotos();
/* 扫码带出：?cntr=箱号 → 自动调取该箱最近一条台账记录 */
const _qc=(new URLSearchParams(location.search).get('cntr')||'').toUpperCase();
if(_qc){
  const rec=records().filter(r=>(r.cntr||'').toUpperCase()===_qc).sort((a,b)=>(b.gtime||'').localeCompare(a.gtime||''))[0];
  if(rec){ try{localStorage.setItem(STORE,JSON.stringify(rec.d));}catch(e){} }
}
restore();
if(_qc && !val('cntr')){ $('cntr').value=_qc; onCntr(); }
renderHistory(); renderStats(); generate();
if(_qc){ $('qText').value=_qc; renderHistory(); dwellQuery(); }
</script>
</body>
</html>
