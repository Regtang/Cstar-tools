<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>喜事达空海运散货装车车型匹配器</title>
<style>
:root{--navy:#252f45;--navy2:#303c58;--rose:#e84368;--teal:#007892;--cyan:#20c7c9;--page:#f5f7fb;--line:#d9e2ec;--muted:#667085;--ink:#1f2937;--ok:#168821;--warn:#b45309;--danger:#d61f3c;--shadow:0 18px 44px rgba(37,47,69,.14)}
*{box-sizing:border-box} body{margin:0;background:var(--page);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif} button,input,select{font:inherit}.app{display:block;min-height:100vh}.side{display:none}.side .logo{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,var(--rose),var(--cyan));display:grid;place-items:center;font-weight:900}.navitem{display:grid;gap:8px;place-items:center;color:#dce7f6;font-size:13px}.navico{font-size:24px;color:var(--rose)}.main{min-width:0}.topbar{background:#fff;border-bottom:1px solid #e6edf4;box-shadow:0 8px 24px rgba(37,47,69,.06);padding:16px 24px}.topbar h1{margin:0;color:var(--navy);font-size:22px}.task-grid{display:grid;grid-template-columns:1.1fr 1.1fr 1fr 1fr;gap:14px}.field label{display:block;color:#58647a;font-weight:800;font-size:13px;margin-bottom:7px}.inp,.sel{width:100%;height:42px;border:1px solid var(--line);border-radius:9px;background:#fff;padding:0 12px;font-weight:700}.inp:focus,.sel:focus{outline:0;border-color:var(--teal);box-shadow:0 0 0 4px rgba(0,120,146,.12)}.workspace{padding:22px 24px}.layout{display:grid;grid-template-columns:1fr;gap:20px;align-items:start}.panel{background:#fff;border:1px solid #e3ebf3;border-radius:14px;box-shadow:var(--shadow);overflow:hidden}.panel-h{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid #edf1f5}.panel-h h2{margin:0;color:var(--navy);font-size:18px}.panel-b{padding:16px 18px}.small{font-size:12px;color:var(--muted)}.btn{border:0;border-radius:10px;padding:10px 14px;font-weight:900;cursor:pointer;transition:.15s}.btn:hover{transform:translateY(-1px)}.primary{background:linear-gradient(135deg,var(--rose),#f06283);color:#fff}.accent{background:linear-gradient(135deg,var(--teal),var(--cyan));color:#fff}.soft{background:#fff;color:var(--navy);border:1px solid var(--line)}.danger{background:#fff1f2;color:var(--danger);border:1px solid #ffc9d1}.btnrow{display:flex;flex-wrap:wrap;gap:8px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}.stat{border:1px solid #e6edf4;border-radius:12px;background:#f8fbfd;padding:11px}.stat span{display:block;color:var(--muted);font-size:12px}.stat b{display:block;margin-top:4px;color:var(--navy)}.cargo-table-wrap{overflow:auto;border:1px solid #e6edf4;border-radius:12px}.cargo-table{border-collapse:separate;border-spacing:0;width:100%;min-width:720px}.cargo-table th{background:#f4f7fb;color:var(--navy);font-size:12px;text-align:left}.cargo-table th,.cargo-table td{border-bottom:1px solid #edf1f5;padding:8px}.cargo-table tr:last-child td{border-bottom:0}.cargo-table input{height:34px}.color-dot{width:14px;height:14px;border-radius:4px;display:inline-block;vertical-align:middle;margin-right:6px}.note{border-radius:11px;padding:11px 12px;line-height:1.65;margin:12px 0}.info{background:#eef8fb;border:1px solid #ccecf3;color:#075f72}.warn{background:#fff7ed;border:1px solid #fed7aa;color:#9a4300}.bad{background:#fff1f2;border:1px solid #ffc9d1;color:#a51d35}.result-title{font-size:24px;font-weight:900;color:var(--navy)}.badge{display:inline-flex;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:900}.ok{background:#eaf8ec;color:var(--ok)}.no{background:#fff1f2;color:var(--danger)}.table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid #e6edf4;border-radius:12px;overflow:hidden}.table th{background:#f4f7fb;color:var(--navy);font-size:12px;text-align:left}.table th,.table td{padding:10px;border-bottom:1px solid #edf1f5;vertical-align:top}.table tr:last-child td{border-bottom:0}.recommend-card{border:1px solid rgba(32,199,201,.36);background:linear-gradient(135deg,#eefbfc,#fff);border-radius:16px;padding:15px;margin:12px 0 14px;box-shadow:0 10px 26px rgba(0,120,146,.10)}.recommend-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.recommend-title{font-size:22px;font-weight:950;color:var(--navy);line-height:1.25}.recommend-sub{font-size:12px;color:var(--muted);margin-top:4px}.mini-stats{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:12px;margin-top:12px}.mini-stat{border:1px solid #dcebf0;background:#fff;border-radius:12px;padding:10px}.mini-stat span{display:block;font-size:12px;color:var(--muted)}.mini-stat b{display:block;margin-top:3px;color:var(--navy)}.section-title{display:flex;align-items:center;justify-content:space-between;margin:12px 0 8px}.section-title h3{margin:0;font-size:15px;color:var(--navy)}.result-table-wrap{overflow:auto;border:1px solid #e6edf4;border-radius:12px}.result-table{min-width:760px}.reason-tags{display:flex;flex-wrap:wrap;gap:6px;max-width:520px}.reason-chip{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:800;background:#f1f5f9;color:#475569;white-space:nowrap}.reason-chip.fail{background:#fff1f2;color:#a51d35}.reason-chip.pass{background:#eaf8ec;color:var(--ok)}.reason-detail{margin-top:6px}.reason-detail summary{cursor:pointer;color:#64748b;font-size:12px;font-weight:800}.reason-detail div{margin-top:6px;color:#475569;line-height:1.55;font-size:12px}.empty-recommend{border:1px solid #ffc9d1;background:#fff1f2;border-radius:16px;padding:14px;color:#a51d35}.visual-panel{min-height:620px}.view-head{display:flex;gap:10px;align-items:center;justify-content:space-between}.tabs{display:flex;gap:6px;background:#f2f6fa;border:1px solid #dbe5ef;border-radius:10px;padding:4px}.tab{border:0;background:transparent;color:#667085;border-radius:8px;padding:8px 12px;font-weight:900;cursor:pointer}.tab.active{background:#fff;color:var(--navy);box-shadow:0 3px 10px rgba(37,47,69,.12)}.canvas-wrap{position:relative;margin:0 18px 18px;height:520px;border:1px solid #dfe8f2;border-radius:12px;overflow:hidden;background:#f8fbfd}.canvas-wrap:before{content:"";position:absolute;inset:0;background-image:linear-gradient(#dce7f1 1px,transparent 1px),linear-gradient(90deg,#dce7f1 1px,transparent 1px);background-size:34px 34px;opacity:.9}.canvas-wrap canvas{position:absolute;inset:0;width:100%;height:100%;display:block;cursor:grab;touch-action:none}.canvas-wrap canvas:active{cursor:grabbing}.hud{position:absolute;left:14px;bottom:10px;color:#64748b;font-size:12px;background:rgba(255,255,255,.82);border:1px solid #e2e8f0;border-radius:999px;padding:7px 12px}.legend{display:grid;gap:8px;margin-top:12px}.legend-row{display:flex;align-items:center;gap:8px;color:#4b5563;font-size:13px}.step-list{display:grid;gap:8px;margin-top:10px}.step{display:flex;gap:9px;align-items:flex-start;border:1px solid #edf1f5;background:#fbfdff;border-radius:10px;padding:9px;font-size:13px;color:#4b5563}.step b{color:var(--navy)}.result-panel{margin-top:20px}.catalog{margin-top:20px}@media(max-width:1050px){.canvas-wrap{height:420px}}@media print{.btnrow,.tabs,.hud{display:none}.app{display:block}.panel{box-shadow:none}.layout{grid-template-columns:1fr}.canvas-wrap{height:420px}}
</style>
</head>
<body>
<div class="app"><main class="main"><header class="topbar"><h1>空海运散货装车车型匹配器</h1></header><section class="workspace"><div class="layout"><section class="panel"><div class="panel-h"><h2>货物清单</h2><span class="small">多规格货物</span></div><div class="panel-b"><div class="field"><label>装载策略</label><select id="stackable" class="sel"><option value="no">不可堆叠：优先地板面积</option><option value="yes">可堆叠：允许分层排布</option></select></div><div class="field" style="margin-top:10px"><label>尺寸安全余量 mm</label><input id="margin" class="inp" type="number" value="50"></div><div class="stats" id="cargoSummary"><div class="stat"><span>总件数</span><b>-</b></div><div class="stat"><span>总体积</span><b>-</b></div><div class="stat"><span>总毛重</span><b>-</b></div><div class="stat"><span>最大单件</span><b>-</b></div></div><div class="cargo-table-wrap"><table class="cargo-table"><thead><tr><th>货物</th><th>长</th><th>宽</th><th>高</th><th>kg/件</th><th>件数</th><th></th></tr></thead><tbody id="cargoBody"></tbody></table></div><div class="btnrow" style="margin-top:12px"><button class="btn soft" onclick="addCargoRow()">添加货物</button><button class="btn primary" onclick="calc()">匹配车型并装载</button><button class="btn soft" onclick="fillDemo()">示例数据</button><button class="btn accent" onclick="window.print()">打印/PDF</button></div><p class="note info">装载视图参考装箱软件工作台：彩色块对应货物清单，虚线框对应车厢空间。图示为自动排布建议，不替代现场装车复核。</p></div></section><section class="panel visual-panel"><div class="panel-h view-head"><h2>装载视图</h2><div style="display:flex;gap:10px;align-items:center"><select id="vehicleSelect" class="sel" style="width:170px" onchange="calc(true)"></select><div class="tabs"><button class="tab active" data-view="3d" onclick="setViewMode('3d',this)">3D</button><button class="tab" data-view="iso" onclick="setViewMode('iso',this)">等距</button><button class="tab" data-view="top" onclick="setViewMode('top',this)">俯视</button><button class="tab" data-view="side" onclick="setViewMode('side',this)">侧视</button></div></div></div><div class="canvas-wrap" id="canvasWrap"><canvas id="loadCanvas"></canvas><div class="hud">左键拖动旋转 · Shift/右键拖动平移 · 滚轮按鼠标位置缩放 · 双击适应窗口</div></div><div class="panel-b" style="padding-top:0"><div class="btnrow"><button class="btn soft" onclick="fitView()">适应窗口</button><button class="btn soft" onclick="toggleAuto()">自动旋转/暂停</button><button class="btn soft" onclick="setViewMode('3d')">恢复3D</button></div><div class="legend" id="legend"></div><div class="step-list" id="steps"></div></div></section></div><section class="panel result-panel"><div class="panel-h"><h2>装载结果</h2><span class="small">最小可装车型与校验明细</span></div><div class="panel-b"><div id="result"><p class="note info">请输入货物信息后点击计算。</p></div></div></section><section class="panel catalog"><div class="panel-h"><h2>车型库</h2><span class="small">经验参数，可替换为承运商实际数据</span></div><div class="panel-b"><table class="table" id="tbl"></table></div></section></section></main></div>
<script>
const vehicles=[{code:'van_4_2',name:'4.2米厢式货车',length:4200,width:2100,height:2100,payload:3000,priority:10},{code:'van_5_2',name:'5.2米厢式货车',length:5200,width:2200,height:2200,payload:5000,priority:20},{code:'van_6_8',name:'6.8米厢式货车',length:6800,width:2400,height:2500,payload:10000,priority:30},{code:'van_7_6',name:'7.6米厢式货车',length:7600,width:2450,height:2600,payload:12000,priority:40},{code:'van_8_6',name:'8.6米厢式货车',length:8600,width:2450,height:2700,payload:15000,priority:50},{code:'van_9_6',name:'9.6米厢式货车',length:9600,width:2450,height:2700,payload:18000,priority:60},{code:'van_13',name:'13米厢式半挂',length:13000,width:2450,height:2700,payload:30000,priority:70},{code:'van_17_5',name:'17.5米厢式/平板半挂',length:17500,width:3000,height:3000,payload:35000,priority:80}];
const palette=['#e84368','#007892','#f97316','#60a5fa','#8b5cf6','#14b8a6','#ef4444','#f59e0b'];
let state={vehicle:null,items:[],plan:null,view:'3d',rx:-0.55,ry:0.72,zoom:1,panX:0,panY:0,drag:false,lastX:0,lastY:0,auto:false,raf:null};
function fmtPct(x){return isFinite(x)?(x*100).toFixed(1)+'%':'-'} function fmtM3(x){return (x/1e9).toFixed(2)+' m³'} function fmtM2(x){return (x/1e6).toFixed(2)+' ㎡'} function q(sel,root=document){return root.querySelector(sel)}
function addCargoRow(item={name:'',l:'',w:'',h:'',unitWeight:'',qty:1}){const tr=document.createElement('tr');const idx=document.querySelectorAll('#cargoBody tr').length;tr.innerHTML=`<td><span class="color-dot" style="background:${palette[idx%palette.length]}"></span><input class="inp cargo-name" style="width:120px" value="${item.name||''}" placeholder="货物${idx+1}"></td><td><input class="inp cargo-l" type="number" value="${item.l||''}" style="width:76px"></td><td><input class="inp cargo-w" type="number" value="${item.w||''}" style="width:76px"></td><td><input class="inp cargo-h" type="number" value="${item.h||''}" style="width:76px"></td><td><input class="inp cargo-weight" type="number" value="${item.unitWeight||''}" style="width:82px"></td><td><input class="inp cargo-qty" type="number" value="${item.qty||1}" style="width:68px"></td><td><button class="btn danger" onclick="removeCargoRow(this)">删</button></td>`;q('#cargoBody').appendChild(tr);}
function removeCargoRow(btn){const body=q('#cargoBody');if(body.children.length>1)btn.closest('tr').remove();updateSummary(readCargo())}
function readCargo(){const margin=Number(q('#margin').value||0);return [...document.querySelectorAll('#cargoBody tr')].map((tr,i)=>{const l=Number(q('.cargo-l',tr).value||0),w=Number(q('.cargo-w',tr).value||0),h=Number(q('.cargo-h',tr).value||0),unitWeight=Number(q('.cargo-weight',tr).value||0),qty=Number(q('.cargo-qty',tr).value||0);return{name:q('.cargo-name',tr).value||`货物${i+1}`,l,w,h,unitWeight,qty,lm:l+margin,wm:w+margin,hm:h+margin,weight:unitWeight*qty,volume:(l+margin)*(w+margin)*(h+margin)*qty,floor:(l+margin)*(w+margin)*qty,color:palette[i%palette.length]}})}
function summarize(items){return items.reduce((a,x)=>{a.qty+=x.qty;a.weight+=x.weight;a.volume+=x.volume;a.floor+=x.floor;a.maxL=Math.max(a.maxL,x.lm);a.maxW=Math.max(a.maxW,x.wm);a.maxH=Math.max(a.maxH,x.hm);return a},{qty:0,weight:0,volume:0,floor:0,maxL:0,maxW:0,maxH:0})}
function updateSummary(items){const s=summarize(items||[]);q('#cargoSummary').innerHTML=`<div class="stat"><span>总件数</span><b>${s.qty}</b></div><div class="stat"><span>总体积</span><b>${fmtM3(s.volume)}</b></div><div class="stat"><span>总毛重</span><b>${s.weight.toFixed(1)} kg</b></div><div class="stat"><span>最大单件</span><b>${s.maxL}×${s.maxW}×${s.maxH}</b></div>`;}
function check(v,items,stackable){const s=summarize(items);const reasons=[];if(s.maxL>v.length)reasons.push('最大单件长度不足');if(s.maxW>v.width)reasons.push('最大单件宽度不足');if(s.maxH>v.height)reasons.push('最大单件高度不足');if(s.weight>v.payload*.9)reasons.push('重量超过90%安全载重');if(s.volume>v.length*v.width*v.height*.95)reasons.push('总体积超过95%车厢容积');const floorUtil=s.floor/(v.length*v.width);if(!stackable&&floorUtil>.92)reasons.push('不可堆叠时地板面积不足');return{...v,ok:reasons.length===0,reasons,total:s,volUtil:s.volume/(v.length*v.width*v.height),weightUtil:s.weight/v.payload,floorUtil,lenRemain:v.length-s.maxL,widRemain:v.width-s.maxW,heiRemain:v.height-s.maxH}}
function shortReason(reason){
 if(reason.includes('长度'))return '长度不足';
 if(reason.includes('宽度'))return '宽度不足';
 if(reason.includes('高度'))return '高度不足';
 if(reason.includes('重量'))return '超重';
 if(reason.includes('体积'))return '体积不足';
 if(reason.includes('地板'))return '地板不足';
 return reason.length>6?reason.slice(0,6):reason;
}
function reasonCell(r){
 if(r.ok)return '<div class="reason-tags"><span class="reason-chip pass">满足全部条件</span></div>';
 const tags=r.reasons.map(x=>`<span class="reason-chip fail">${shortReason(x)}</span>`).join('');
 return `<div class="reason-tags">${tags}</div><details class="reason-detail"><summary>展开原因</summary><div>${r.reasons.map(x=>'• '+x).join('<br>')}</div></details>`;
}
function calc(keepVehicle=false){const items=readCargo();if(!items.length||items.some(x=>!x.l||!x.w||!x.h||!x.qty||!x.unitWeight||x.l<0||x.w<0||x.h<0||x.qty<0||x.unitWeight<0)){q('#result').innerHTML='<p class="note bad">请为每一行货物输入有效的长、宽、高、单件毛重和件数。</p>';return}updateSummary(items);const stackable=q('#stackable').value==='yes';const rows=vehicles.map(v=>check(v,items,stackable));const feasible=rows.filter(r=>r.ok).sort((a,b)=>a.priority-b.priority||a.volUtil-b.volUtil);const selectedCode=q('#vehicleSelect').value;let match=keepVehicle&&selectedCode?rows.find(r=>r.code===selectedCode):feasible[0];if(!match)match=rows[0];let html='';if(feasible.length){const m=feasible[0];html+=`<div class="recommend-card"><div class="recommend-head"><div><div class="recommend-title">${m.name}</div><div class="recommend-sub">系统推荐的最小可装车型</div></div><span class="badge ok">最小可装</span></div><div class="mini-stats"><div class="mini-stat"><span>体积利用</span><b>${fmtPct(m.volUtil)}</b></div><div class="mini-stat"><span>重量利用</span><b>${fmtPct(m.weightUtil)}</b></div><div class="mini-stat"><span>地板占用</span><b>${fmtPct(m.floorUtil)}</b></div><div class="mini-stat"><span>长/宽/高余量</span><b>${m.lenRemain}/${m.widRemain}/${m.heiRemain} mm</b></div></div></div>`}else{html='<div class="empty-recommend"><b>暂无可装车型</b><br>默认车型库中没有完全满足条件的车型，建议考虑更大车型、高栏、平板或拆分运输。</div>'}html+=`<div class="section-title"><h3>车型校验明细</h3><span class="small">原因已压缩为标签，可展开查看完整说明</span></div><div class="result-table-wrap"><table class="table result-table"><thead><tr><th>车型</th><th>状态</th><th>体积利用</th><th>重量利用</th><th>地板占用</th><th>校验原因</th></tr></thead><tbody>${rows.map(r=>`<tr><td><b>${r.name}</b></td><td>${r.ok?'<span class="badge ok">可装</span>':'<span class="badge no">不满足</span>'}</td><td>${fmtPct(r.volUtil)}</td><td>${fmtPct(r.weightUtil)}</td><td>${fmtPct(r.floorUtil)}</td><td>${reasonCell(r)}</td></tr>`).join('')}</tbody></table></div>`;q('#result').innerHTML=html;renderPlan(match,items,stackable)}
function createPlan(vehicle,items,stackable){const boxes=[],gap=Math.max(25,Math.min(vehicle.width,vehicle.length)*.01),wall=70;const expanded=[];items.forEach((it,i)=>{for(let k=0;k<Math.min(it.qty,80);k++)expanded.push({...it,idx:i,seq:k+1})});expanded.sort((a,b)=>b.lm*b.wm*b.hm-a.lm*a.wm*a.hm);let x=vehicle.length-wall,y=wall,z=wall,rowW=0,levelH=0;for(const it of expanded){const l=it.lm,w=it.wm,h=it.hm;if(x-l<wall){x=vehicle.length-wall;y+=rowW+gap;rowW=0}if(y+w>vehicle.width-wall&&stackable){x=vehicle.length-wall;y=wall;z+=levelH+gap;rowW=0;levelH=0}if(y+w>vehicle.width-wall||z+h>vehicle.height-wall)continue;boxes.push({name:it.name,x:x-l,y:z,z:y,l,w,h,color:it.color,idx:it.idx,seq:it.seq});x-=l+gap;rowW=Math.max(rowW,w);levelH=Math.max(levelH,h)}return{boxes,total:expanded.length,shown:boxes.length}}
function renderPlan(vehicle,items,stackable){state.vehicle=vehicle;state.items=items;state.plan=createPlan(vehicle,items,stackable);q('#vehicleSelect').value=vehicle.code;const legend=items.map((x,i)=>`<div class="legend-row"><span class="color-dot" style="background:${x.color}"></span><b>${x.name}</b><span>${x.l}×${x.w}×${x.h} mm × ${x.qty} 件</span></div>`).join('');q('#legend').innerHTML=legend;const steps=state.plan.boxes.slice(0,8).map((b,i)=>`<div class="step"><span class="color-dot" style="background:${b.color}"></span><div><b>${i+1}. ${b.name}</b><br>从车厢门进入，向车厢头方向靠前摆放</div></div>`).join('');q('#steps').innerHTML=steps+`<div class="small">显示 ${state.plan.shown}/${state.plan.total} 件；超过可视上限或空间不足的货物需人工复核。</div>`;fitView(false);draw()}
function setViewMode(mode,btn){state.view=mode;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.view===mode));if(mode==='top'){state.rx=-Math.PI/2;state.ry=0}else if(mode==='side'){state.rx=-.05;state.ry=Math.PI/2}else if(mode==='iso'){state.rx=-.62;state.ry=.78}else{state.rx=-.55;state.ry=.72}state.auto=false;fitView(false);draw()}
function fitView(redraw=true){state.zoom=1;state.panX=0;state.panY=0;if(redraw)draw()}
function toggleAuto(){state.auto=!state.auto;loop()}
function setupCanvas(){const c=q('#loadCanvas');if(c.dataset.bound)return;c.dataset.bound='1';c.addEventListener('contextmenu',e=>e.preventDefault());c.addEventListener('pointerdown',e=>{state.drag=true;state.lastX=e.clientX;state.lastY=e.clientY;state.panMode=e.shiftKey||e.button===2;c.setPointerCapture(e.pointerId);state.auto=false});c.addEventListener('pointermove',e=>{if(!state.drag)return;const dx=e.clientX-state.lastX,dy=e.clientY-state.lastY;state.lastX=e.clientX;state.lastY=e.clientY;if(state.panMode){state.panX+=dx;state.panY+=dy}else{state.ry+=dx*.008;state.rx+=dy*.008;state.rx=Math.max(-1.45,Math.min(.35,state.rx))}draw()});c.addEventListener('pointerup',()=>state.drag=false);c.addEventListener('pointercancel',()=>state.drag=false);c.addEventListener('wheel',e=>{e.preventDefault();const rect=c.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;const old=state.zoom;const next=Math.max(.35,Math.min(4,state.zoom*(e.deltaY>0?.9:1.1)));state.panX=mx-(mx-state.panX)*(next/old);state.panY=my-(my-state.panY)*(next/old);state.zoom=next;state.auto=false;draw()},{passive:false});c.addEventListener('dblclick',()=>{fitView();});window.addEventListener('resize',draw)}
function project(p,scale,cx,cy){let x=p.x-state.vehicle.length/2,y=p.y-state.vehicle.height/2,z=p.z-state.vehicle.width/2;const cosY=Math.cos(state.ry),sinY=Math.sin(state.ry),cosX=Math.cos(state.rx),sinX=Math.sin(state.rx);let x1=x*cosY-z*sinY,z1=x*sinY+z*cosY;let y1=y*cosX-z1*sinX,z2=y*sinX+z1*cosX;return{x:cx+x1*scale*state.zoom,y:cy-y1*scale*state.zoom,z:z2}}
function cuboid(b,color,label,alpha=1){const x=b.x,y=b.y,z=b.z,l=b.l,w=b.w,h=b.h;const P=[{x,y,z},{x:x+l,y,z},{x:x+l,y:y+h,z},{x,y:y+h,z},{x,y,z:z+w},{x:x+l,y,z:z+w},{x:x+l,y:y+h,z:z+w},{x,y:y+h,z:z+w}];return[{pts:[P[0],P[1],P[2],P[3]],color,label,alpha,name:'门/头面'},{pts:[P[4],P[5],P[6],P[7]],color,label,alpha,name:'门/头面'},{pts:[P[0],P[4],P[7],P[3]],color,label,alpha,name:'车厢左'},{pts:[P[1],P[5],P[6],P[2]],color,label,alpha,name:'车厢右'},{pts:[P[3],P[2],P[6],P[7]],color,label,alpha,name:'车厢顶'},{pts:[P[0],P[1],P[5],P[4]],color,label,alpha,name:'车厢底'}]}
function drawFace(ctx,face,scale,cx,cy,stroke,dashed=false){const pts=face.pts.map(p=>project(p,scale,cx,cy));ctx.save();ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.closePath();ctx.globalAlpha=face.alpha;ctx.fillStyle=face.color;ctx.fill();ctx.globalAlpha=1;ctx.strokeStyle=stroke;ctx.lineWidth=face.truck?1.6:1;if(dashed)ctx.setLineDash([7,5]);ctx.stroke();ctx.restore();return pts}
function centerOf(pts){return pts.reduce((a,p)=>({x:a.x+p.x/pts.length,y:a.y+p.y/pts.length}),{x:0,y:0})}
function draw(){setupCanvas();const c=q('#loadCanvas'),wrap=q('#canvasWrap');const rect=wrap.getBoundingClientRect(),dpr=Math.min(devicePixelRatio||1,2);c.width=rect.width*dpr;c.height=rect.height*dpr;c.style.width=rect.width+'px';c.style.height=rect.height+'px';const ctx=c.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,rect.width,rect.height);if(!state.vehicle||!state.plan){ctx.fillStyle='#64748b';ctx.font='700 16px Microsoft YaHei';ctx.fillText('计算后显示装载视图',30,40);return}const v=state.vehicle;const scale=Math.min(rect.width*.62/v.length,rect.height*.54/Math.max(v.width,v.height));const cx=rect.width/2+state.panX,cy=rect.height/2+state.panY+25;const faces=[];cuboid({x:0,y:0,z:0,l:v.length,w:v.width,h:v.height},'rgba(32,199,201,.055)','车厢',.35).forEach(f=>faces.push({...f,truck:true}));state.plan.boxes.forEach((b,i)=>cuboid(b,b.color,b.name,.86).forEach(f=>faces.push({...f,cargo:true,idx:i})));faces.forEach(f=>f.depth=f.pts.map(p=>project(p,scale,cx,cy).z).reduce((a,b)=>a+b,0)/f.pts.length);faces.sort((a,b)=>a.depth-b.depth);faces.forEach(f=>{const pts=drawFace(ctx,f,scale,cx,cy,f.truck?'#8593a6':'rgba(31,41,55,.55)',f.truck);if(f.cargo&&f.name==='车厢顶'){const c=centerOf(pts);ctx.fillStyle='rgba(31,41,55,.55)';ctx.font='700 10px Microsoft YaHei';ctx.fillText(String(f.idx+1),c.x-3,c.y+3)}});const labels=[['车厢门',{x:0,y:v.height*.45,z:v.width*.5}],['车厢头',{x:v.length,y:v.height*.45,z:v.width*.5}],['车厢顶',{x:v.length*.5,y:v.height,z:v.width*.5}],['车厢底',{x:v.length*.5,y:0,z:v.width*.5}],['车厢左',{x:v.length*.5,y:v.height*.45,z:0}],['车厢右',{x:v.length*.5,y:v.height*.45,z:v.width}]];ctx.font='800 13px Microsoft YaHei';labels.forEach(([txt,p])=>{const pp=project(p,scale,cx,cy);ctx.fillStyle='rgba(255,255,255,.92)';ctx.strokeStyle='rgba(37,47,69,.18)';ctx.lineWidth=4;ctx.strokeText(txt,pp.x-20,pp.y);ctx.fillStyle='#252f45';ctx.fillText(txt,pp.x-20,pp.y)});ctx.fillStyle='#64748b';ctx.font='12px Microsoft YaHei';ctx.fillText('车厢门靠近视角，货物从门进入，优先向车厢头方向排布',18,24)}
function loop(){if(state.raf)return;const tick=()=>{if(state.auto&&state.vehicle){state.ry+=.006;draw()}state.raf=requestAnimationFrame(tick)};state.raf=requestAnimationFrame(tick)}
function fillDemo(){q('#cargoBody').innerHTML='';addCargoRow({name:'主机',l:5800,w:2200,h:2100,unitWeight:3200,qty:1});addCargoRow({name:'配件箱',l:1200,w:1000,h:900,unitWeight:450,qty:3});addCargoRow({name:'托盘辅料',l:1100,w:1100,h:1300,unitWeight:600,qty:2});q('#margin').value=50;q('#stackable').value='no';calc()}
function init(){q('#vehicleSelect').innerHTML=vehicles.map(v=>`<option value="${v.code}">${v.name}</option>`).join('');q('#tbl').innerHTML='<thead><tr><th>车型</th><th>内长</th><th>内宽</th><th>内高</th><th>经验载重</th></tr></thead><tbody>'+vehicles.map(v=>`<tr><td>${v.name}</td><td>${v.length} mm</td><td>${v.width} mm</td><td>${v.height} mm</td><td>${v.payload} kg</td></tr>`).join('')+'</tbody>';fillDemo();setupCanvas();draw()}init();
</script>
</body>
</html>
